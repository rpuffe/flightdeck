# Reusable workflow: PR validation with ZERO cloud credentials. OIDC trust
# (bootstrap/oidc.tf) only covers refs/heads/main and refs/tags/v* — PR refs
# are deliberately excluded, so unmerged code never holds AWS credentials.
# For the same reason there is no terraform plan here (plan needs a role to
# assume); just build, both Trivy gates, and fmt/init/validate.
name: pr-checks

on:
  workflow_call:

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Read app name from manifest
        id: manifest
        run: |
          if [ ! -f app-manifest.yaml ]; then
            echo "::error::app-manifest.yaml not found at repo root — every flightdeck app must have one (spec §6)."
            exit 1
          fi
          name="$(yq '.name' app-manifest.yaml)"
          if [ -z "$name" ] || [ "$name" = "null" ]; then
            echo "::error::app-manifest.yaml is missing the required 'name' field."
            exit 1
          fi
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: docker build -t app:${{ github.sha }} .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: app:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          # Unfixable vulns would block builds with no available remediation —
          # gate only on issues a fix could actually resolve (spec §5b threshold).
          ignore-unfixed: true

      # Deliberate HIGH/CRITICAL-only gate (spec 5b threshold), same as
      # terraform-plan-apply.yml.
      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "config"
          scan-ref: "."
          severity: "HIGH,CRITICAL"
          exit-code: "1"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.13"
          # The wrapper breaks piping/exit-code handling in scripted steps.
          terraform_wrapper: false

      - name: Terraform fmt check
        run: terraform fmt -check

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate
