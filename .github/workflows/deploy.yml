# THE single entrypoint app repos call. An app's ci.yml pins exactly one ref:
#
#   uses: rpuffe/flightdeck/.github/workflows/deploy.yml@<tag>
#
# The nested references below MUST be fully qualified and pinned to this
# repo's own release tag: when a reusable workflow is called cross-repo,
# GitHub resolves `./` local references against the CALLING repo (where they
# don't exist) — discovered the hard way in the v0.1.0 exit test.
# RELEASE CHORE: bump these @refs (and template-app's two refs) to the new
# tag in the same commit that gets tagged.
name: deploy

on:
  workflow_call:
    inputs:
      aws-role-arn:
        description: "OIDC deploy role ARN to assume"
        type: string
        required: true
      aws-region:
        description: "AWS region"
        type: string
        default: "us-east-1"

jobs:
  build:
    uses: rpuffe/flightdeck/.github/workflows/build-scan-push.yml@v0.2.0
    with:
      aws-role-arn: ${{ inputs.aws-role-arn }}
      aws-region: ${{ inputs.aws-region }}

  deploy:
    needs: build
    uses: rpuffe/flightdeck/.github/workflows/terraform-plan-apply.yml@v0.2.0
    with:
      image: ${{ needs.build.outputs.image }}
      aws-role-arn: ${{ inputs.aws-role-arn }}
      aws-region: ${{ inputs.aws-region }}
